<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-Title</title>

    <style>
        * {
            margin: 0;
            padding: 0;
        }

        #css-box {
            margin: 30px;
            border-width: 3px;
            margin-left: 50px;
            margin-right: 100px;
            border-color: red;
            border-style: solid;
            border: 3px solid blue;
            border-radius: 14px;

            padding: 40px;
            padding-top: 50px;
            padding-right: 60px;
            padding-bottom: 100px;

            background-image: url("icons8-css-48.png");
            background-repeat: no-repeat;
            background-size: 300px;
            background-position: bottom;

        }

        h1 {
            font-size: 64px;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;

        }


        .btn {
            padding: 10px;
            padding-left: 30px;
            padding-right: 30px;
            border-radius: 10px;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 44px;
            cursor: pointer;
            border: none;
            box-shadow: 1px 0px 50px;

        }

        #css-img {

            width: 80px;
            height: 100px;
            object-fit: cover;
            margin-left: auto;
            margin-right: auto;
        }

        #img-box {
            text-align: center;
            margin-top: 100px;
            margin-bottom: 100px;
            
        }
    </style>


</head>

<body>

    <div id="css-box">

        <h1>CSS is Easy</h1>
        <p>css shikhee fatai felaytase</p>

        <button>Enroll Now</button>
    </div>

    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Numquam harum consequatur, facere architecto ipsam
        excepturi dolores cupiditate iure accusantium id quibusdam quasi autem perferendis nemo ullam? Cum dolores sequi
        dolor?</p>


    <div>
        <img id="css-img" src="icons8-css-48.png" alt="">
        <button>want to learn</button>
    </div>

</body>

</html>
