    <h1>Registration Form</h1>
    <form action="submit_form.php" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>

        <input type="submit" value="Register">

        <input type="date" id="birthday" name="birthday"><br><br>

        <label for="Gender">Your Gender:</ label> required <br><br>

            <label><input type="checkbox" name="hobbies" value="cooking"> Cooking</label><br>
            <label><input type="checkbox" name="hobbies" value="sports"> Sports</label><br><br>

            <br><br>

            <label for="Favorite Color">Your Favorite Color:</label> required <br><br>
            <select id="color" name="color">
                <option value="">Select a color</option>
                <option value="red">Red</option>
                <option value="blue">Blue</option>
                <option value="green">Green</option>
                <option value="yellow">Yellow</option>
            </select><br><br>

            <label for="Favorite Fruit">Your Favorite Fruit:</label> required <br><br>
            <select id="fruit" name="fruit" multiple>
